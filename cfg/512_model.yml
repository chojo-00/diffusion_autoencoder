model:
    network:
        unet:
            image_size: 512
            num_channels: 128
            num_res_blocks: 2
            channel_mult: ""
            learn_sigma: False
            class_cond: False
            use_checkpoint: False
            attention_resolutions: "32,16,8"
            num_heads: 4,
            num_head_channels: 64
            num_heads_upsample: -1
            use_scale_shift_norm: True
            dropout: 0.0
            resblock_updown: True
            use_fp16: False
            use_new_attention_order: False
            in_channels: 1
        encoder:
            image_size: 512
            in_channels: 1
            out_channels: 512
            encoder_use_fp16: False
            encoder_width: 128
            encoder_depth: 2
            encoder_attention_resolutions: "16"
            encoder_use_scale_shift_norm: True
            encoder_resblock_updown: False
            encoder_pool: "adaptive"
    timesteps:
        num: 1000
        sample: uniform
    beta:
        schedule: linear
        linear:
            start: 0.0001
            end: 0.02
        cosine:
            s: 0.008
            max_beta: 0.999
